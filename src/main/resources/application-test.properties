# Banco de dados de Teste (Limpo a cada execução)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# --- Configurações do JWT para Testes ---
secret_access=${JWT_ACCESS_SECRET}
expiration_access=${JWT_EXPIRATION_ACCESS}
secret_refresh=${JWT_REFRESH_SECRET}
expiration_refresh=${JWT_EXPIRATION_REFRESH}
